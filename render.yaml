# Render Blueprint — API (Node) + SPA (static).
# Dashboard: New → Blueprint → connect this repo.
#
# After first deploy, set in the Render dashboard:
#   API: MONGODB_URI, JWT_SECRET, JWT_REFRESH_SECRET, FRONTEND_URL (comma-separated
#        origins, include your static site URL, e.g. https://auction-nepal-web.onrender.com)
#   Web: REACT_APP_API_URL = https://<your-api-service>.onrender.com/api
#
# Optional web env: REACT_APP_SOCKET_URL = https://<your-api-service>.onrender.com
# (omit if same host as API without /api; socketService derives this from REACT_APP_API_URL)

services:
  - type: web
    name: auction-nepal-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"

  # Create React App — global CDN, TLS, React Router SPA fallback
  - type: web
    name: auction-nepal-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && CI=false npm run build
    # Relative to rootDir (frontend/) — CRA output is build/
    staticPublishPath: ./build
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: REACT_APP_API_URL
        sync: false
